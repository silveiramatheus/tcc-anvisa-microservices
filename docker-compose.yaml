services:
  db:
    image: postgres:15-alpine
    container_name: anvisa_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  etl:
    build: 
      context: ./data-pipelines
      dockerfile: Dockerfile
    container_name: anvisa_etl
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
      PYTHONUNBUFFERED: 1
    volumes:
      - ./data-pipelines/src:/app/src
      - ./data-pipelines/data:/app/data
      - ./data-pipelines/logs:/app/logs
    command: tail -f /dev/null

  api:
    build: 
      context: ./api-service
    container_name: anvisa_api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}
    volumes:
      - ./api-service/src:/app/src

volumes:
  postgres_data: